services:
  - type: web
    name: back-to-me
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: ADMIN_PROTECT
        value: "false"
      - key: ADMIN_TOKEN
        sync: false
      - key: DATABASE_DRIVER
        sync: false
      - key: POSTGRES_URL
        sync: false
      - key: POSTGRES_SSL
        value: "true"
      - key: STORAGE_DRIVER
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ENDPOINT
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "true"
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_PUBLIC_BASE_URL
        sync: false

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/style/admin.css" />
  <title>Back To Me Admin</title>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Back To Me Admin</h1>
        <div class="muted">Xem submission, mở ảnh, tìm theo mã và tải toàn bộ ảnh khi cần.</div>
      </div>
      <div class="actions">
        <input id="searchInput" type="search" placeholder="Tìm theo mã, tên hoặc nghề..." />
        <button id="refreshButton" type="button">Làm mới</button>
        <button id="downloadImagesButton" type="button">Tải ZIP ảnh</button>
        <button id="exportButton" type="button">Tải CSV</button>
      </div>
    </div>

    <div class="stats">
      <div><strong id="countValue">0</strong> submissions</div>
      <div class="muted" id="statusText">Đang tải dữ liệu...</div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Thời gian</th>
            <th>Người lớn</th>
            <th>Hồi bé</th>
            <th>Ảnh người lớn</th>
            <th>Ảnh hồi bé</th>
            <th>Mã</th>
            <th>Thao tác</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td class="empty" colspan="7">Đang tải...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js" referrerpolicy="no-referrer"></script>
  <script>
    const searchInput = document.getElementById("searchInput");
    const refreshButton = document.getElementById("refreshButton");
    const exportButton = document.getElementById("exportButton");
    const downloadImagesButton = document.getElementById("downloadImagesButton");
    const countValue = document.getElementById("countValue");
    const statusText = document.getElementById("statusText");
    const tableBody = document.getElementById("tableBody");
    const adminToken = new URLSearchParams(window.location.search).get("token") || "";

    function withToken(url) {
      if (!adminToken) return url;
      const nextUrl = new URL(url, window.location.origin);
      nextUrl.searchParams.set("token", adminToken);
      return nextUrl.toString();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function formatCardInfo(prefix, row) {
      const labels = {
        adult: [
          ["Tên", row.adult_name],
          ["Tuổi", row.adult_age],
          ["Công việc", row.adult_job],
          ["Life Update", row.adult_life_update],
          ["Superpower", row.adult_super],
          ["Current Issues", row.adult_issues]
        ],
        child: [
          ["Tên", row.child_name],
          ["Tuổi", row.child_age],
          ["Dream Job", row.child_dream],
          ["Life Update", row.child_life_update],
          ["Superpower", row.child_super],
          ["Current Issues", row.child_issues]
        ]
      };

      return labels[prefix]
        .map(([label, value]) => `<div><strong>${escapeHtml(label)}:</strong> ${escapeHtml(value || "-")}</div>`)
        .join("");
    }

    function setActionState(isBusy, message) {
      refreshButton.disabled = isBusy;
      exportButton.disabled = isBusy;
      downloadImagesButton.disabled = isBusy;
      if (message) statusText.textContent = message;
    }

    async function deleteSubmission(submissionId) {
      const accepted = window.confirm(`Xóa submission ${submissionId} cùng 2 ảnh đã lưu?`);
      if (!accepted) return;

      statusText.textContent = `Đang xóa ${submissionId}...`;

      const response = await fetch(withToken(`/api/submissions/${encodeURIComponent(submissionId)}`), {
        method: "DELETE"
      });
      const payload = await response.json();

      if (!response.ok) {
        throw new Error(payload.error || "Không thể xóa submission.");
      }

      statusText.textContent = `Đã xóa ${submissionId}.`;
      await loadRows();
    }

    function bindDeleteButtons() {
      document.querySelectorAll("[data-delete-id]").forEach((button) => {
        button.addEventListener("click", () => {
          deleteSubmission(button.getAttribute("data-delete-id")).catch((error) => {
            statusText.textContent = error.message;
          });
        });
      });
    }

    function bindHqButtons() {
      document.querySelectorAll("[data-hq-id]").forEach((link) => {
        link.addEventListener("click", (event) => {
          event.preventDefault();
          const submissionId = link.getAttribute("data-hq-id");
          window.open(withToken(`/print.html?id=${encodeURIComponent(submissionId)}`), "_blank");
        });
      });
    }

    async function fetchAllRowsForExport() {
      const countResponse = await fetch(withToken("/api/submissions/count"));
      const countPayload = await countResponse.json();

      if (!countResponse.ok) {
        throw new Error(countPayload.error || "Không thể đếm submissions.");
      }

      const total = Math.max(1, Number(countPayload.total) || 1);
      const rowsUrl = new URL(withToken("/api/submissions"), window.location.origin);
      rowsUrl.searchParams.set("limit", String(total));
      const rowsResponse = await fetch(rowsUrl.toString());
      const rowsPayload = await rowsResponse.json();

      if (!rowsResponse.ok) {
        throw new Error(rowsPayload.error || "Không thể tải danh sách ảnh.");
      }

      return rowsPayload.rows || [];
    }

    async function fetchImageBlob(imagePath) {
      const response = await fetch(imagePath, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`Không tải được ảnh: ${imagePath}`);
      }
      return response.blob();
    }

    async function downloadImagesZip() {
      if (!window.JSZip) {
        throw new Error("Không tải được thư viện ZIP.");
      }

      setActionState(true, "Đang chuẩn bị file ảnh...");

      const rows = await fetchAllRowsForExport();
      if (!rows.length) {
        throw new Error("Chưa có submission nào để tải ảnh.");
      }

      const zip = new JSZip();
      let savedCount = 0;

      for (let index = 0; index < rows.length; index += 1) {
        const row = rows[index];
        statusText.textContent = `Đang gom ảnh ${index + 1}/${rows.length}: ${row.id}`;

        const imagePairs = [
          [row.adult_card_path, `${row.id}.png`],
          [row.child_card_path, `${row.id}-(1).png`]
        ];

        for (const [imagePath, fileName] of imagePairs) {
          if (!imagePath) continue;
          const imageBlob = await fetchImageBlob(imagePath);
          zip.file(fileName, imageBlob);
          savedCount += 1;
        }
      }

      const archiveBlob = await zip.generateAsync({ type: "blob" });
      const archiveUrl = URL.createObjectURL(archiveBlob);
      const anchor = document.createElement("a");
      anchor.href = archiveUrl;
      anchor.download = `back-to-me-images-${new Date().toISOString().slice(0, 10)}.zip`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(archiveUrl);

      statusText.textContent = `Đã tải ZIP gồm ${savedCount} ảnh.`;
      setActionState(false);
    }

    async function loadRows() {
      statusText.textContent = "Đang tải dữ liệu...";
      const search = searchInput.value.trim();
      const listUrl = new URL(withToken("/api/submissions"), window.location.origin);
      if (search) listUrl.searchParams.set("search", search);
      listUrl.searchParams.set("limit", "200");

      const [rowsResponse, countResponse] = await Promise.all([
        fetch(listUrl.toString()),
        fetch(withToken("/api/submissions/count"))
      ]);

      const rowsPayload = await rowsResponse.json();
      const countPayload = await countResponse.json();

      if (!rowsResponse.ok) throw new Error(rowsPayload.error || "Cannot load rows.");
      if (!countResponse.ok) throw new Error(countPayload.error || "Cannot load count.");

      countValue.textContent = countPayload.total || 0;
      statusText.textContent = search ? `Đang lọc theo: ${search}` : "Hiển thị submission mới nhất";

      if (!rowsPayload.rows || rowsPayload.rows.length === 0) {
        tableBody.innerHTML = '<tr><td class="empty" colspan="7">Chưa có submission nào.</td></tr>';
        return;
      }

      tableBody.innerHTML = rowsPayload.rows.map((row) => `
        <tr>
          <td>${escapeHtml(row.created_at)}</td>
          <td>${formatCardInfo("adult", row)}</td>
          <td>${formatCardInfo("child", row)}</td>
          <td><a href="${escapeHtml(row.adult_card_path)}" target="_blank" rel="noreferrer"><img class="thumb" src="${escapeHtml(row.adult_card_path)}" alt="" /></a></td>
          <td><a href="${escapeHtml(row.child_card_path)}" target="_blank" rel="noreferrer"><img class="thumb" src="${escapeHtml(row.child_card_path)}" alt="" /></a></td>
          <td><code>${escapeHtml(row.id)}</code></td>
          <td>
            <a class="secondary-button" href="/print.html?id=${escapeHtml(row.id)}" data-hq-id="${escapeHtml(row.id)}">Render HQ</a>
            <button class="danger-button" type="button" data-delete-id="${escapeHtml(row.id)}">Xóa</button>
          </td>
        </tr>
      `).join("");

      bindDeleteButtons();
      bindHqButtons();
    }

    refreshButton.addEventListener("click", () => {
      loadRows().catch((error) => {
        statusText.textContent = error.message;
      });
    });

    searchInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        loadRows().catch((error) => {
          statusText.textContent = error.message;
        });
      }
    });

    exportButton.addEventListener("click", () => {
      window.open(withToken("/api/submissions/export.csv"), "_blank");
    });

    downloadImagesButton.addEventListener("click", () => {
      downloadImagesZip().catch((error) => {
        setActionState(false, error.message);
      });
    });

    loadRows().catch((error) => {
      statusText.textContent = error.message;
      tableBody.innerHTML = `<tr><td class="empty" colspan="7">${escapeHtml(error.message)}</td></tr>`;
    });
  </script>
</body>
</html>

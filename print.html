<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Back To Me - Render HQ</title>
  <link rel="stylesheet" href="style/style.css" />
  <link rel="stylesheet" href="style/product.css" />
  <link rel="stylesheet" href="style/card-transition.css" />
  <link rel="stylesheet" href="style/print.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="print-page">
  <div class="print-shell">
    <img src="assets/images/logo-full.png" class="logo-product" alt="Back To Me logo" />
    <h1 class="print-title">Render HQ Cho Ban Tổ Chức</h1>
    <p id="printStatus" class="print-status">Đang tải submission...</p>

    <div class="print-actions">
      <button id="downloadPrintButton" type="button">Tải 2 PNG HQ</button>
      <a id="openAdultStored" class="secondary-link" target="_blank" rel="noreferrer">Mở file lưu người lớn</a>
      <a id="openChildStored" class="secondary-link" target="_blank" rel="noreferrer">Mở file lưu hồi bé</a>
    </div>

    <div class="card-output print-card-output">
      <div class="card-side">
        <div class="card-info">
          <div class="avatar-wrapper">
            <img id="adultImg" class="photo-adult" alt="Ảnh hiện tại" />
          </div>

          <div class="card-title-text">
            <div class="card-header-top">
              <div class="card-header">
                <p class="card-present">nhaydoibiachuyen presents:</p>
                <img src="assets/images/be-bu-title.png" class="card-title" alt="" />
              </div>

              <div class="logo-wrapper">
                <img src="assets/images/logo-text.png" class="card-logo" alt="Nguệch logo" />
              </div>
            </div>

            <div class="text-adult">
              <p class="line-name-age">Name: <span id="adultName"></span> Age: <span id="adultAge"></span></p>
              <p data-label="Current Job:"><span id="adultJob"></span></p>
              <p data-label="Life Update:"><span id="adultLifeUpdate"></span></p>
              <p data-label="Superpowers:"><span id="adultSuper"></span></p>
              <p data-label="Current Issues:"><span id="adultIssues"></span></p>
              <p>Status:</p>
            </div>
          </div>
        </div>

        <img src="assets/images/under-deadline-control-stamp.png" class="card-stamp" alt="" />
      </div>

      <div class="card-side-1">
        <div class="card-info">
          <div class="avatar-wrapper">
            <img id="childImg" class="photo-child" alt="Ảnh hồi bé" />
          </div>

          <div class="card-title-text">
            <div class="card-header-top">
              <div class="card-header">
                <p class="card-present">nhaydoibiachuyen presents:</p>
                <img src="assets/images/be-ti-title.png" class="card-title" alt="" />
              </div>

              <div class="logo-wrapper">
                <img src="assets/images/logo-text.png" class="card-logo" alt="Nguệch logo" />
              </div>
            </div>

            <div class="text-child">
              <p class="line-name-age">Name: <span id="childName"></span> Age: <span id="childAge"></span></p>
              <p data-label="Dream Job:"><span id="childDream"></span></p>
              <p data-label="Life Update:"><span id="childLifeUpdate"></span></p>
              <p data-label="Superpowers:"><span id="childSuper"></span></p>
              <p data-label="Current Issues:"><span id="childIssues"></span></p>
              <p>Status:</p>
            </div>
          </div>
        </div>

        <img src="assets/images/under-parent-control-stamp.png" class="card-stamp" alt="" />
      </div>
    </div>
  </div>

  <script src="js/print-render.js"></script>
</body>
</html>
